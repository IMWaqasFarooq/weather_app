name: weather_app
description: >
  A polished, open-source weather app built with Flutter. Search any city or
  use your current location to see live conditions, hourly and 7-day
  forecasts, powered by the free Open-Meteo API.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.5+1

  # Networking
  http: ^1.2.2

  # Value equality for models
  equatable: ^2.0.7

  # Local persistence (recent cities, unit + theme preference)
  shared_preferences: ^2.3.3

  # Device location for "use my location"
  geolocator: ^13.0.2

  # Resolves a place name from coordinates via the platform's native
  # geocoder — Open-Meteo has no reverse-geocoding endpoint of its own.
  geocoding: ^5.0.0

  # Date/time formatting
  intl: ^0.19.0

  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Lightweight mocking for tests (no code generation)
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/
